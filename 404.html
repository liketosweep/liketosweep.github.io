<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERROR_404::UNAUTHORIZED_ACCESS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #050810;
        color: #ff3c6e; /* Danger Red */
        font-family: "Share Tech Mono", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        text-align: center;
        cursor: none !important;
      }
      .glitch {
        font-size: 5rem;
        font-weight: bold;
        text-transform: uppercase;
        position: relative;
        text-shadow:
          0.05em 0 0 #00f5c4,
          -0.025em -0.05em 0 #7b2fff,
          0.025em 0.05em 0 #ffbe2e;
        animation: glitch 500ms infinite;
      }
      @keyframes glitch {
        0% {
          text-shadow:
            0.05em 0 0 #00f5c4,
            -0.05em -0.025em 0 #7b2fff,
            -0.025em 0.05em 0 #ffbe2e;
        }
        14% {
          text-shadow:
            0.05em 0 0 #00f5c4,
            -0.05em -0.025em 0 #7b2fff,
            -0.025em 0.05em 0 #ffbe2e;
        }
        15% {
          text-shadow:
            -0.05em -0.025em 0 #00f5c4,
            0.025em 0.025em 0 #7b2fff,
            -0.05em -0.05em 0 #ffbe2e;
        }
        49% {
          text-shadow:
            -0.05em -0.025em 0 #00f5c4,
            0.025em 0.025em 0 #7b2fff,
            -0.05em -0.05em 0 #ffbe2e;
        }
        50% {
          text-shadow:
            0.025em 0.05em 0 #00f5c4,
            0.05em 0 0 #7b2fff,
            0 -0.05em 0 #ffbe2e;
        }
        99% {
          text-shadow:
            0.025em 0.05em 0 #00f5c4,
            0.05em 0 0 #7b2fff,
            0 -0.05em 0 #ffbe2e;
        }
        100% {
          text-shadow:
            -0.025em 0 0 #00f5c4,
            -0.025em -0.025em 0 #7b2fff,
            -0.025em -0.05em 0 #ffbe2e;
        }
      }
      .msg {
        margin-top: 20px;
        color: #c8d8f0;
        font-size: 1.2rem;
      }
      .back-link {
        margin-top: 40px;
        color: #00f5c4;
        text-decoration: none;
        border: 1px solid #00f5c4;
        padding: 10px 20px;
        transition: all 0.3s;
      }
      .back-link:hover {
        background: rgba(0, 245, 196, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="glitch">404</div>
    <div class="msg">CRITICAL_ERROR: REQUESTED_RESOURCE_NOT_FOUND</div>
    <div class="msg" style="font-size: 0.9rem; opacity: 0.7">
      Location traced. Log generated.
    </div>
    <a href="index.html" class="back-link">[ RETURN_TO_DASHBOARD ]</a>
  </body>
</html>
